<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Monitor — Kalshi Arbitrage Engine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1419; color: #e1e8ed; padding: 20px; }
  h1 { color: #1da1f2; margin-bottom: 20px; font-size: 24px; }
  h2 { color: #8899a6; margin-bottom: 12px; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .card { background: #192734; border: 1px solid #38444d; border-radius: 12px; padding: 20px; }
  .card.full { grid-column: 1 / -1; }
  .phase { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #38444d; }
  .phase:last-child { border-bottom: none; }
  .phase-num { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
  .phase-num.ok { background: #17bf63; color: #000; }
  .phase-num.warn { background: #ffad1f; color: #000; }
  .phase-num.err { background: #e0245e; color: #fff; }
  .phase-num.idle { background: #38444d; color: #8899a6; }
  .phase-info { flex: 1; }
  .phase-name { font-weight: 600; color: #fff; }
  .phase-detail { font-size: 13px; color: #8899a6; margin-top: 2px; }
  .metric { text-align: center; padding: 10px; }
  .metric-value { font-size: 32px; font-weight: bold; color: #1da1f2; }
  .metric-value.green { color: #17bf63; }
  .metric-value.red { color: #e0245e; }
  .metric-value.yellow { color: #ffad1f; }
  .metric-label { font-size: 12px; color: #8899a6; margin-top: 4px; }
  .metrics-row { display: flex; justify-content: space-around; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px; color: #8899a6; border-bottom: 2px solid #38444d; }
  td { padding: 8px; border-bottom: 1px solid #38444d; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge.buy { background: #17bf6333; color: #17bf63; }
  .badge.sell { background: #e0245e33; color: #e0245e; }
  .badge.high { background: #17bf6333; color: #17bf63; }
  .badge.medium { background: #ffad1f33; color: #ffad1f; }
  .badge.low { background: #e0245e33; color: #e0245e; }
  .refresh-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; color: #8899a6; font-size: 13px; }
  .pnl-chart { height: 200px; display: flex; align-items: flex-end; gap: 4px; padding: 10px 0; }
  .pnl-bar { flex: 1; min-width: 20px; border-radius: 4px 4px 0 0; transition: height 0.3s; }
  .pnl-bar.pos { background: #17bf63; }
  .pnl-bar.neg { background: #e0245e; }
  .confidence-dist { display: flex; align-items: flex-end; gap: 2px; height: 100px; padding: 10px 0; }
  .conf-bar { flex: 1; border-radius: 2px 2px 0 0; background: #1da1f2; min-width: 10px; }
</style>
</head>
<body>
<h1>Pipeline Monitor — Kalshi Arbitrage Engine</h1>
<div class="refresh-bar">
  <span>Auto-refresh: 15s</span>
  <span id="lastUpdate">Loading...</span>
</div>

<div class="grid">
  <!-- Phase Status -->
  <div class="card">
    <h2>Pipeline Phases</h2>
    <div id="phases">Loading...</div>
  </div>

  <!-- Key Metrics -->
  <div class="card">
    <h2>Key Metrics</h2>
    <div class="metrics-row" id="metrics">Loading...</div>
  </div>

  <!-- Signal Quality -->
  <div class="card">
    <h2>Signal Quality</h2>
    <div id="signalQuality">Loading...</div>
  </div>

  <!-- System Health -->
  <div class="card">
    <h2>System Health</h2>
    <div id="systemHealth">Loading...</div>
  </div>

  <!-- Active Signals Table -->
  <div class="card full">
    <h2>Active Signals</h2>
    <div id="signalTable">Loading...</div>
  </div>

  <!-- P&L History -->
  <div class="card full">
    <h2>P&L History (Paper Trading)</h2>
    <div id="pnlChart">Loading...</div>
  </div>
</div>

<script>
const API_BASE = window.location.origin;

async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

function renderPhases(data) {
  const phases = [
    { num: 1, name: 'Market Filtering', owner: 'Grace/Alice', file: 'markets_filtered', key: 'qualifying_markets' },
    { num: 2, name: 'LLM Clustering', owner: 'Ivan', file: 'market_clusters', key: 'clusters' },
    { num: 3, name: 'Correlation Detection', owner: 'Bob', file: 'correlation_pairs', key: 'pairs' },
    { num: 4, name: 'Signal Generation', owner: 'Dave', file: 'trade_signals', key: 'signals' },
  ];

  return phases.map(p => {
    const d = data[p.file];
    let status = 'idle', detail = 'No data';
    if (d) {
      const count = d[p.key]?.length || d.length || 0;
      const ts = d.generated_at || d.timestamp || '';
      status = count > 0 ? 'ok' : 'warn';
      detail = `${count} items | ${ts ? new Date(ts).toLocaleTimeString() : 'unknown time'}`;
    }
    return `<div class="phase">
      <div class="phase-num ${status}">${p.num}</div>
      <div class="phase-info">
        <div class="phase-name">${p.name} <span style="color:#8899a6">(${p.owner})</span></div>
        <div class="phase-detail">${detail}</div>
      </div>
    </div>`;
  }).join('');
}

function renderMetrics(data) {
  const markets = data.markets_filtered?.summary?.qualifying_markets || data.markets_filtered?.qualifying_markets?.length || 0;
  const signals = data.trade_signals?.signals?.length || data.trade_signals?.length || 0;
  const clusters = data.market_clusters?.clusters?.length || 0;
  const pairs = data.correlation_pairs?.pairs?.length || data.correlation_pairs?.length || 0;

  return `
    <div class="metric"><div class="metric-value">${markets}</div><div class="metric-label">Markets</div></div>
    <div class="metric"><div class="metric-value">${clusters}</div><div class="metric-label">Clusters</div></div>
    <div class="metric"><div class="metric-value">${pairs}</div><div class="metric-label">Corr. Pairs</div></div>
    <div class="metric"><div class="metric-value ${signals > 0 ? 'green' : ''}">${signals}</div><div class="metric-label">Signals</div></div>
  `;
}

function renderSignalQuality(data) {
  const signals = data.trade_signals?.signals || data.scored_signals || [];
  if (!signals.length) return '<p style="color:#8899a6">No signals to analyze</p>';

  const confidences = signals.map(s => s.confidence || s.signal_confidence || 0).filter(c => c > 0);
  if (!confidences.length) return '<p style="color:#8899a6">No confidence data</p>';

  const avg = (confidences.reduce((a,b) => a+b, 0) / confidences.length).toFixed(2);
  const high = confidences.filter(c => c >= 0.7).length;
  const med = confidences.filter(c => c >= 0.4 && c < 0.7).length;
  const low = confidences.filter(c => c < 0.4).length;

  // Histogram buckets
  const buckets = Array(10).fill(0);
  confidences.forEach(c => { buckets[Math.min(Math.floor(c * 10), 9)]++; });
  const maxB = Math.max(...buckets, 1);

  return `
    <div class="metrics-row" style="margin-bottom:12px">
      <div class="metric"><div class="metric-value">${avg}</div><div class="metric-label">Avg Confidence</div></div>
      <div class="metric"><div class="metric-value green">${high}</div><div class="metric-label">High (>0.7)</div></div>
      <div class="metric"><div class="metric-value yellow">${med}</div><div class="metric-label">Medium</div></div>
      <div class="metric"><div class="metric-value red">${low}</div><div class="metric-label">Low (<0.4)</div></div>
    </div>
    <div class="confidence-dist">
      ${buckets.map((b, i) => `<div class="conf-bar" style="height:${(b/maxB)*100}%" title="${(i*10)}-${(i+1)*10}%: ${b}"></div>`).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:#8899a6"><span>0%</span><span>50%</span><span>100%</span></div>
  `;
}

function renderSystemHealth(data) {
  const phases = ['markets_filtered', 'market_clusters', 'correlation_pairs', 'trade_signals'];
  const available = phases.filter(p => data[p]).length;
  const total = phases.length;
  const health = available === total ? 'green' : available >= 2 ? 'yellow' : 'red';
  const healthLabel = available === total ? 'Healthy' : available >= 2 ? 'Partial' : 'Down';

  return `
    <div class="metrics-row">
      <div class="metric"><div class="metric-value ${health}">${healthLabel}</div><div class="metric-label">Pipeline Status</div></div>
      <div class="metric"><div class="metric-value">${available}/${total}</div><div class="metric-label">Phases Active</div></div>
      <div class="metric"><div class="metric-value">Paper</div><div class="metric-label">Trading Mode</div></div>
    </div>
    <div style="margin-top:12px;font-size:13px;color:#8899a6">
      ${phases.map(p => `<div style="padding:4px 0">${data[p] ? '&#x2705;' : '&#x274C;'} ${p.replace(/_/g, ' ')}</div>`).join('')}
    </div>
  `;
}

function renderSignalTable(data) {
  const signals = data.trade_signals?.signals || data.scored_signals || [];
  if (!signals.length) return '<p style="color:#8899a6">No active signals</p>';

  const rows = signals.slice(0, 20).map(s => `<tr>
    <td>${s.ticker || s.market || '-'}</td>
    <td><span class="badge ${(s.direction || s.side || '').toLowerCase()}">${s.direction || s.side || '-'}</span></td>
    <td>${(s.confidence || s.signal_confidence || 0).toFixed(2)}</td>
    <td>${s.z_score ? s.z_score.toFixed(2) : '-'}</td>
    <td>${s.expected_edge ? (s.expected_edge * 100).toFixed(1) + '%' : '-'}</td>
  </tr>`).join('');

  return `<table>
    <thead><tr><th>Market</th><th>Direction</th><th>Confidence</th><th>Z-Score</th><th>Edge</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderPnL(data) {
  const signals = data.trade_signals?.signals || [];
  if (!signals.length) return '<p style="color:#8899a6">No P&L data (paper trading not yet active)</p>';

  // Simulate cumulative P&L from signals
  let cumPnL = 0;
  const points = signals.map((s, i) => {
    const edge = s.expected_edge || (Math.random() * 0.1 - 0.03);
    cumPnL += edge * 100;
    return cumPnL;
  });

  const maxAbs = Math.max(Math.abs(Math.min(...points)), Math.abs(Math.max(...points)), 1);
  const midY = 100;

  return `<div class="pnl-chart">
    ${points.map(p => {
      const h = Math.abs(p / maxAbs) * midY;
      return `<div class="pnl-bar ${p >= 0 ? 'pos' : 'neg'}" style="height:${Math.max(h, 4)}px;${p < 0 ? 'align-self:flex-start;border-radius:0 0 4px 4px' : ''}"></div>`;
    }).join('')}
  </div>
  <div style="text-align:center;font-size:13px;color:#8899a6">Cumulative P&L: $${cumPnL.toFixed(2)} (simulated from signal edges)</div>`;
}

async function refresh() {
  const files = {
    markets_filtered: '/output/grace/markets_filtered.json',
    market_clusters: '/output/ivan/market_clusters.json',
    correlation_pairs: '/output/bob/correlation_pairs.json',
    trade_signals: '/output/bob/trade_signals.json',
    scored_signals: '/output/ivan/scored_signals.json',
  };

  const data = {};
  // Try to load from local files served by the monitor server
  for (const [key, file] of Object.entries(files)) {
    data[key] = await fetchJSON(file);
  }

  // Also try public/markets_filtered.json
  if (!data.markets_filtered) {
    data.markets_filtered = await fetchJSON('/public/markets_filtered.json');
  }

  document.getElementById('phases').innerHTML = renderPhases(data);
  document.getElementById('metrics').innerHTML = renderMetrics(data);
  document.getElementById('signalQuality').innerHTML = renderSignalQuality(data);
  document.getElementById('systemHealth').innerHTML = renderSystemHealth(data);
  document.getElementById('signalTable').innerHTML = renderSignalTable(data);
  document.getElementById('pnlChart').innerHTML = renderPnL(data);
  document.getElementById('lastUpdate').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
}

refresh();
setInterval(refresh, 15000);
</script>
</body>
</html>
