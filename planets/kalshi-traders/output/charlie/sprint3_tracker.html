<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint 3 Progress Tracker — Kalshi Alpha</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --orange: #d18616;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    min-height: 100vh;
  }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 24px; }
  .refresh-info { color: var(--text-dim); font-size: 0.75rem; position: absolute; top: 24px; right: 24px; }

  /* Handoff Chain */
  .chain-section { margin-bottom: 32px; }
  .section-title { font-size: 1.1rem; margin-bottom: 16px; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .chain {
    display: flex;
    align-items: center;
    gap: 0;
    overflow-x: auto;
    padding: 16px 0;
  }
  .chain-node {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    min-width: 180px;
    text-align: center;
    position: relative;
    transition: border-color 0.3s;
  }
  .chain-node.done { border-color: var(--green); }
  .chain-node.in_progress, .chain-node.in_review { border-color: var(--yellow); }
  .chain-node.open { border-color: var(--border); }
  .chain-node.blocked { border-color: var(--red); }

  .chain-arrow {
    display: flex;
    align-items: center;
    padding: 0 8px;
    color: var(--text-dim);
    font-size: 1.5rem;
    flex-shrink: 0;
  }
  .chain-arrow.complete { color: var(--green); }

  .node-agent { font-weight: 600; font-size: 1rem; margin-bottom: 4px; }
  .node-task { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px; }
  .node-title { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; line-height: 1.3; }

  .status-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-badge.done { background: rgba(63,185,80,0.15); color: var(--green); }
  .status-badge.in_progress { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .status-badge.in_review { background: rgba(188,140,255,0.15); color: var(--purple); }
  .status-badge.open { background: rgba(139,148,158,0.15); color: var(--text-dim); }
  .status-badge.blocked { background: rgba(248,81,73,0.15); color: var(--red); }

  /* Parallel Tasks Grid */
  .parallel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
    margin-top: 12px;
  }
  .parallel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    border-left: 3px solid var(--border);
  }
  .parallel-card.done { border-left-color: var(--green); }
  .parallel-card.in_progress { border-left-color: var(--yellow); }
  .parallel-card.in_review { border-left-color: var(--purple); }
  .parallel-card.open { border-left-color: var(--text-dim); }

  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .card-agent { font-weight: 600; font-size: 0.9rem; }
  .card-task { font-size: 0.75rem; color: var(--text-dim); }
  .card-title { font-size: 0.8rem; color: var(--text-dim); line-height: 1.3; }

  /* Summary Bar */
  .summary {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .summary-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    text-align: center;
    min-width: 100px;
  }
  .summary-value { font-size: 1.5rem; font-weight: 700; }
  .summary-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .summary-value.green { color: var(--green); }
  .summary-value.yellow { color: var(--yellow); }
  .summary-value.blue { color: var(--accent); }

  /* Handoff Log */
  .handoff-log { margin-top: 16px; }
  .log-entry {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
  }
  .log-icon { font-size: 1rem; }
  .log-text { color: var(--text-dim); }
  .log-text strong { color: var(--text); }

  @media (max-width: 768px) {
    body { padding: 12px; }
    .chain { flex-direction: column; align-items: stretch; }
    .chain-arrow { transform: rotate(90deg); justify-content: center; padding: 4px 0; }
    .parallel-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <h1>Sprint 3 — Progress Tracker</h1>
  <p class="subtitle">Production Quality via Collaboration (D6) — Handoff Chain Visualization</p>
  <div class="refresh-info" id="refresh-info">Auto-refresh: 15s</div>

  <div class="summary" id="summary"></div>

  <div class="chain-section">
    <div class="section-title">Critical Path — Handoff Chain</div>
    <div class="chain" id="chain"></div>
    <div class="handoff-log" id="handoff-log"></div>
  </div>

  <div class="chain-section">
    <div class="section-title">Parallel Tasks</div>
    <div class="parallel-grid" id="parallel"></div>
  </div>

<script>
const CHAIN_TASKS = [
  { id: 567, agent: 'Bob', role: 'Signals', handsOffTo: 'Dave' },
  { id: 568, agent: 'Dave', role: 'Backtest', handsOffTo: 'Tina' },
  { id: 570, agent: 'Tina', role: 'QA', handsOffTo: 'Olivia' },
  { id: 572, agent: 'Olivia', role: 'Review', handsOffTo: null },
];

const PARALLEL_TASKS = [569, 571, 573, 574, 575, 576];

const API_BASE = window.location.port === ''
  ? ''
  : `${window.location.protocol}//${window.location.hostname}:3199`;

function statusClass(s) {
  if (!s) return 'open';
  return s.replace(/\s+/g, '_').toLowerCase();
}

function statusLabel(s) {
  if (!s) return 'OPEN';
  return s.toUpperCase().replace(/_/g, ' ');
}

function isComplete(s) {
  return s === 'done' || s === 'in_review';
}

function buildSummary(tasks) {
  const sprint3 = tasks.filter(t => CHAIN_TASKS.some(c => c.id === t.id) || PARALLEL_TASKS.includes(t.id));
  const done = sprint3.filter(t => t.status === 'done').length;
  const inProgress = sprint3.filter(t => t.status === 'in_progress').length;
  const inReview = sprint3.filter(t => t.status === 'in_review').length;
  const total = sprint3.length;

  const chainComplete = CHAIN_TASKS.filter(c => {
    const t = tasks.find(t => t.id === c.id);
    return t && (t.status === 'done' || t.status === 'in_review');
  }).length;

  document.getElementById('summary').innerHTML = `
    <div class="summary-item"><div class="summary-value green">${done}</div><div class="summary-label">Done</div></div>
    <div class="summary-item"><div class="summary-value yellow">${inReview}</div><div class="summary-label">In Review</div></div>
    <div class="summary-item"><div class="summary-value yellow">${inProgress}</div><div class="summary-label">In Progress</div></div>
    <div class="summary-item"><div class="summary-value blue">${total}</div><div class="summary-label">Total Tasks</div></div>
    <div class="summary-item"><div class="summary-value ${chainComplete === CHAIN_TASKS.length ? 'green' : 'yellow'}">${chainComplete}/${CHAIN_TASKS.length}</div><div class="summary-label">Chain Steps Done</div></div>
  `;
}

function buildChain(tasks) {
  const container = document.getElementById('chain');
  container.innerHTML = '';

  CHAIN_TASKS.forEach((c, i) => {
    const task = tasks.find(t => t.id === c.id);
    const status = task ? task.status : 'open';
    const title = task ? task.title : '';

    const node = document.createElement('div');
    node.className = `chain-node ${statusClass(status)}`;
    node.innerHTML = `
      <div class="node-agent">${c.agent}</div>
      <div class="node-task">T${c.id} — ${c.role}</div>
      <div class="node-title">${title}</div>
      <span class="status-badge ${statusClass(status)}">${statusLabel(status)}</span>
    `;
    container.appendChild(node);

    if (i < CHAIN_TASKS.length - 1) {
      const arrow = document.createElement('div');
      const complete = isComplete(status);
      arrow.className = `chain-arrow${complete ? ' complete' : ''}`;
      arrow.textContent = '→';
      container.appendChild(arrow);
    }
  });
}

function buildHandoffLog(tasks) {
  const container = document.getElementById('handoff-log');
  const entries = [];

  CHAIN_TASKS.forEach((c, i) => {
    const task = tasks.find(t => t.id === c.id);
    const status = task ? task.status : 'open';

    if (status === 'done' || status === 'in_review') {
      entries.push({
        icon: '✅',
        text: `<strong>${c.agent}</strong> completed T${c.id} (${c.role})${c.handsOffTo ? ` → handed off to <strong>${c.handsOffTo}</strong>` : ''}`
      });
    } else if (status === 'in_progress') {
      entries.push({
        icon: '🔄',
        text: `<strong>${c.agent}</strong> is working on T${c.id} (${c.role})`
      });
    } else {
      const prev = i > 0 ? CHAIN_TASKS[i-1] : null;
      if (prev) {
        const prevTask = tasks.find(t => t.id === prev.id);
        const prevDone = prevTask && (prevTask.status === 'done' || prevTask.status === 'in_review');
        entries.push({
          icon: prevDone ? '⏳' : '⏸',
          text: prevDone
            ? `<strong>${c.agent}</strong> — T${c.id} (${c.role}) ready to start`
            : `<strong>${c.agent}</strong> — T${c.id} (${c.role}) waiting on ${prev.agent}`
        });
      } else {
        entries.push({
          icon: '⏳',
          text: `<strong>${c.agent}</strong> — T${c.id} (${c.role}) not started`
        });
      }
    }
  });

  container.innerHTML = entries.map(e => `
    <div class="log-entry">
      <span class="log-icon">${e.icon}</span>
      <span class="log-text">${e.text}</span>
    </div>
  `).join('');
}

function buildParallel(tasks) {
  const container = document.getElementById('parallel');
  container.innerHTML = '';

  PARALLEL_TASKS.forEach(id => {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    const status = task.status || 'open';
    const card = document.createElement('div');
    card.className = `parallel-card ${statusClass(status)}`;
    card.innerHTML = `
      <div class="card-header">
        <span class="card-agent">${task.assignee || '?'}</span>
        <span class="status-badge ${statusClass(status)}">${statusLabel(status)}</span>
      </div>
      <div class="card-task">T${task.id}</div>
      <div class="card-title">${task.title}</div>
    `;
    container.appendChild(card);
  });
}

async function refresh() {
  try {
    const res = await fetch(`${API_BASE}/api/tasks`);
    const tasks = await res.json();
    // Normalize IDs
    tasks.forEach(t => { if (typeof t.id === 'string') t.id = parseInt(t.id, 10); });

    buildSummary(tasks);
    buildChain(tasks);
    buildHandoffLog(tasks);
    buildParallel(tasks);

    document.getElementById('refresh-info').textContent =
      `Last update: ${new Date().toLocaleTimeString()} — auto-refresh: 15s`;
  } catch (e) {
    document.getElementById('refresh-info').textContent = `Error: ${e.message}`;
  }
}

refresh();
setInterval(refresh, 15000);
</script>
</body>
</html>
