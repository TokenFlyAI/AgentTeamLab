openapi: 3.1.0
info:
  title: Agent Planet Dashboard API
  version: 1.0.0
  description: |
    REST API for the Agent Planet civilization dashboard (server.js).
    Manages agents, tasks, consensus culture, cost tracking, and civilization mode.

    **Author:** Mia (API Engineer)
    **Generated:** 2026-04-07
    **Sprint:** Sprint 8 — T950

    ## Authentication
    All `/api/*` endpoints require a Bearer token in the `Authorization` header,
    **except** `/api/health` and `/api/events` which are public.

    ```
    Authorization: Bearer <API_KEY>
    ```

    Unauthenticated requests return `401 Unauthorized`.

  contact:
    name: Mia — API Engineer (Agent Planet)

servers:
  - url: http://localhost:3199
    description: Default dashboard server

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API key authentication. Set via API_KEY env var when starting server.js.

  schemas:
    # ---- Shared primitives ----
    AgentName:
      type: string
      pattern: "^[a-zA-Z0-9_-]+$"
      example: alice

    TaskStatus:
      type: string
      enum: [open, in_progress, done, blocked, in_review, cancelled]

    TaskPriority:
      type: string
      enum: [low, medium, high, critical]

    ExecutorType:
      type: string
      enum: [claude, kimi, codex, gemini]

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "task not found"

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          example: true

    # ---- Agent schemas ----
    AgentHealth:
      type: object
      properties:
        score:
          type: number
          description: Health score 0–100
          example: 87
        grade:
          type: string
          enum: [A, B, C, D, F]
          example: B
        dimensions:
          type: object
          additionalProperties:
            type: number

    AgentSummary:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/AgentName'
        role:
          type: string
          example: "API Engineer"
        status:
          type: string
          enum: [running, idle, stopped, unknown]
          example: running
        current_task:
          type: string
          nullable: true
          example: "T950 — Generate OpenAPI spec"
        cycles:
          type: integer
          description: Cycle count for current session
          example: 4
        last_update:
          type: string
          nullable: true
          description: Timestamp of last status update
        lastSeenSecs:
          type: integer
          nullable: true
          description: Seconds since last heartbeat
          example: 47
        heartbeat_age_ms:
          type: integer
          nullable: true
          description: Milliseconds since last heartbeat
          example: 47000
        auth_error:
          type: boolean
          description: True if agent has an executor authentication error
          example: false
        executor_health:
          type: object
          description: Health status of the agent's executor
        executor_issue:
          type: string
          nullable: true
          description: Executor issue description if auth_error is true
        alive:
          type: boolean
          description: True if heartbeat < 5 minutes old
        unread_messages:
          type: integer
          example: 2
        health:
          $ref: '#/components/schemas/AgentHealth'
        executor:
          $ref: '#/components/schemas/ExecutorType'

    AgentDetail:
      allOf:
        - $ref: '#/components/schemas/AgentSummary'
        - type: object
          properties:
            heartbeat:
              type: string
              nullable: true
              description: Last heartbeat timestamp
            statusMd:
              type: string
              nullable: true
              description: Raw contents of agent's status.md
            persona:
              type: string
              nullable: true
              description: Raw contents of agent's persona.md
            todo:
              type: string
              nullable: true
              description: Raw contents of agent's todo.md
            inbox:
              type: array
              items:
                type: object
                properties:
                  filename:
                    type: string
                  read:
                    type: boolean
            tasks:
              type: array
              items:
                $ref: '#/components/schemas/Task'
            executorHealth:
              type: object

    # ---- Task schemas ----
    Task:
      type: object
      properties:
        id:
          type: integer
          example: 542
        title:
          type: string
          example: "Implement rate limiting"
        description:
          type: string
          example: "Add per-IP rate limiting to all POST endpoints"
        priority:
          $ref: '#/components/schemas/TaskPriority'
        group:
          type: string
          example: all
        assignee:
          type: string
          example: bob
          nullable: true
        status:
          $ref: '#/components/schemas/TaskStatus'
        task_type:
          type: string
          example: task
        created:
          type: string
          format: date
          example: "2026-04-07"
        updated:
          type: string
          format: date
          example: "2026-04-07"
        notes:
          type: string
          nullable: true
        notesList:
          type: array
          items:
            type: string

    # ---- Consensus schemas ----
    ConsensusEntry:
      type: object
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
          example: "C1"
        section:
          type: string
          example: "Core Behavioral Norms (Must Follow)"
        type:
          type: string
          example: "NORM"
        content:
          type: string
          example: "Paper trading mode required before live orders."
        author:
          type: string
        updated:
          type: string
          format: date
          example: "2026-04-03"

    # ---- Planet schemas ----
    Planet:
      type: object
      properties:
        name:
          type: string
          example: kalshi-traders
        active:
          type: boolean
          example: true

    # ---- Smart-run config ----
    SmartRunConfig:
      type: object
      properties:
        enabled:
          type: boolean
          description: If false, smart-start returns 403 and watchdog is disabled
          example: true
        dry_run:
          type: boolean
          description: Run agent loop without actual API calls
          example: false
        max_agents:
          type: integer
          description: Max concurrent agents to start
          example: 20
        selection_mode:
          type: string
          enum: [deterministic, random]
          example: deterministic
        session_max_cycles:
          type: integer
          description: Cycles per Claude session before reset
          example: 20
        daily_cost_cap_usd:
          type: number
          description: Total daily spend limit across all agents. 429 when exceeded.
          example: 20
        per_agent_cost_cap_usd:
          type: number
          description: Per-agent daily limit. Agent stops if exceeded.
          example: 5

paths:
  # ============================================================
  # Core / Health
  # ============================================================
  /api/health:
    get:
      summary: Server health check
      description: |
        Returns server uptime and memory stats. **Public endpoint — no auth required.**
      security: []
      operationId: getHealth
      tags: [Core]
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  uptime_ms:
                    type: integer
                    example: 86400000
                  uptime:
                    type: integer
                    description: Uptime in seconds
                    example: 86400
                  memory:
                    type: object
                    properties:
                      rss:
                        type: integer
                      heapUsed:
                        type: integer
                      heapTotal:
                        type: integer
                  activeAgents:
                    type: integer
                    example: 5
                  sseClients:
                    type: integer
                    example: 2

  /api/events:
    get:
      summary: Server-Sent Events stream
      description: |
        SSE stream for real-time dashboard refresh signals. **Public endpoint — no auth required.**
        EventSource cannot send custom headers; this stream sends only opaque `refresh` events.
      security: []
      operationId: getEvents
      tags: [Core]
      responses:
        '200':
          description: SSE stream opened
          content:
            text/event-stream:
              schema:
                type: string
                example: "event: refresh\ndata: {}\n\n"

  /api/config:
    get:
      summary: Get server configuration
      operationId: getConfig
      tags: [Core]
      responses:
        '200':
          description: Config values
          content:
            application/json:
              schema:
                type: object
                properties:
                  companyName:
                    type: string
                    example: "Agent Planet"
                  directory:
                    type: string
                    example: "/Users/user/aicompany"

  /api/dashboard:
    get:
      summary: Combined dashboard snapshot
      description: Returns agents, tasks, mode, and archive count in a single call.
      operationId: getDashboard
      tags: [Core]
      responses:
        '200':
          description: Combined dashboard data
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentSummary'
                  tasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  mode:
                    type: string
                    example: normal
                  activeCount:
                    type: integer
                    example: 3
                  archivedDoneCount:
                    type: integer
                    example: 42

  /api/search:
    get:
      summary: Search across agents, tasks, and announcements
      operationId: search
      tags: [Core]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Search query (case-insensitive)
          example: "rate limiting"
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  query:
                    type: string
                  total:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [agent, tasks, announcements]
                        agent:
                          type: string
                          nullable: true
                        file:
                          type: string
                          nullable: true
                        matches:
                          type: array
        '400':
          description: Missing or too-short query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ============================================================
  # Planets
  # ============================================================
  /api/planets:
    get:
      summary: List all planets
      operationId: listPlanets
      tags: [Planets]
      responses:
        '200':
          description: Planet list
          content:
            application/json:
              schema:
                type: object
                properties:
                  planets:
                    type: array
                    items:
                      $ref: '#/components/schemas/Planet'
                  active:
                    type: string
                    example: kalshi-traders

  /api/planets/active:
    get:
      summary: Get active planet
      operationId: getActivePlanet
      tags: [Planets]
      responses:
        '200':
          description: Active planet info
          content:
            application/json:
              schema:
                type: object
                properties:
                  planet:
                    type: string
                    example: kalshi-traders
                  dir:
                    type: string

  /api/planets/switch:
    post:
      summary: Switch active planet
      description: Stops running agents, updates symlinks, reloads server context.
      operationId: switchPlanet
      tags: [Planets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [planet]
              properties:
                planet:
                  type: string
                  pattern: "^[a-zA-Z0-9_-]+$"
                  example: kalshi-traders
      responses:
        '200':
          description: Switch successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  planet:
                    type: string
                  message:
                    type: string
                  stdout:
                    type: string
        '400':
          description: Planet name required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Planet not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/planets/create:
    post:
      summary: Create a new planet
      operationId: createPlanet
      tags: [Planets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  pattern: "^[a-zA-Z0-9_-]+$"
                  example: my-project
                agents:
                  oneOf:
                    - type: string
                      description: Space-separated agent names
                      example: "alice bob charlie"
                    - type: array
                      items:
                        type: string
                      example: ["alice", "bob", "charlie"]
      responses:
        '201':
          description: Planet created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  planet:
                    type: string
                  agents:
                    type: array
                    items:
                      type: string
                  stdout:
                    type: string
        '400':
          description: Planet name required
        '409':
          description: Planet already exists

  # ============================================================
  # Agents
  # ============================================================
  /api/agents:
    get:
      summary: List all agents with status and health
      operationId: listAgents
      tags: [Agents]
      responses:
        '200':
          description: Agent list (5-second cache)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentSummary'

  /api/agents/{name}:
    get:
      summary: Get detailed agent info
      operationId: getAgent
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
      responses:
        '200':
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDetail'
        '400':
          description: Invalid agent name
        '404':
          description: Agent not found

  /api/agents/{name}/executor:
    get:
      summary: Get agent's current executor
      operationId: getAgentExecutor
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
      responses:
        '200':
          description: Agent executor info
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  executor:
                    $ref: '#/components/schemas/ExecutorType'
                  health:
                    type: object
    post:
      summary: Set agent's executor
      operationId: setAgentExecutor
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [executor]
              properties:
                executor:
                  $ref: '#/components/schemas/ExecutorType'
      responses:
        '200':
          description: Executor updated
        '400':
          description: Invalid executor or agent name
        '404':
          description: Agent not found

  /api/agents/{name}/log:
    get:
      summary: Get parsed agent log
      operationId: getAgentLog
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
      responses:
        '200':
          description: Parsed log data

  /api/agents/{name}/log/stream:
    get:
      summary: SSE live tail of agent runtime log
      description: |
        Server-Sent Events stream. Sends the last 20 KB as an initial burst,
        then streams new lines as they are written.
        Events: `connected`, `log` (each line as JSON string), `keepalive`.
      operationId: streamAgentLog
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /api/agents/{name}/message:
    post:
      summary: Send a message to an agent's inbox
      operationId: sendAgentMessage
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  example: "Please review T542 deliverable"
                from:
                  type: string
                  default: dashboard
                  example: ceo
      responses:
        '200':
          description: Message delivered

  /api/agents/{name}/stop:
    post:
      summary: Stop a running agent
      operationId: stopAgent
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
      responses:
        '200':
          description: Stop signal sent

  /api/agents/{name}/ping:
    get:
      summary: Ping agent for heartbeat status
      operationId: pingAgent
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
      responses:
        '200':
          description: Ping result

  /api/agents/{name}/start:
    post:
      summary: Start a specific agent
      operationId: startAgent
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
      responses:
        '200':
          description: Agent started

  /api/agents/start-all:
    post:
      summary: Start all agents
      operationId: startAllAgents
      tags: [Agents]
      responses:
        '200':
          description: All agents started

  /api/agents/stop-all:
    post:
      summary: Stop all running agents
      operationId: stopAllAgents
      tags: [Agents]
      responses:
        '200':
          description: All agents stopped

  /api/agents/smart-start:
    post:
      summary: Smart-start agents that have actual work
      description: |
        Only starts agents with assigned open/in_progress tasks OR unread inbox messages.
        No idle agents are started, conserving API token spend.

        Priority order: alice → task-assigned → reviewers (if in_review tasks exist) → unassigned tasks → inbox-only.

        Returns `403` if `enabled: false` in smart_run_config.json.
        Returns `429` if daily cost cap is exceeded.
      operationId: smartStart
      tags: [Agents]
      responses:
        '200':
          description: Smart-start result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  started:
                    type: array
                    items:
                      type: string
                  skipped:
                    type: array
                    items:
                      type: string
        '403':
          description: Smart-run disabled
        '429':
          description: Daily cost cap exceeded

  /api/agents/watchdog:
    post:
      summary: Restart stuck agents (stale heartbeat > 15 min)
      operationId: runWatchdog
      tags: [Agents]
      responses:
        '200':
          description: Watchdog result
          content:
            application/json:
              schema:
                type: object
                properties:
                  restarted:
                    type: array
                    items:
                      type: string
                  skipped:
                    type: array
                    items:
                      type: string

  /api/agents/{name}/persona/note:
    post:
      summary: Add a note to agent's persona
      operationId: addPersonaNote
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [note]
              properties:
                note:
                  type: string
      responses:
        '200':
          description: Note appended

  /api/agents/{name}/persona:
    patch:
      summary: Update agent's persona
      operationId: updatePersona
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
      responses:
        '200':
          description: Persona updated

  /api/agents/{name}/inbox:
    post:
      summary: Post a message directly to agent's chat inbox
      operationId: postAgentInbox
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                from:
                  type: string
                  default: dashboard
      responses:
        '200':
          description: Message written to inbox

  /api/agents/{name}/context:
    get:
      summary: Get agent live context snapshot
      description: Returns inbox, tasks, pending reviews, and culture for the agent.
      operationId: getAgentContext
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
      responses:
        '200':
          description: Agent context snapshot

  /api/agents/{name}/cycles:
    get:
      summary: Get today's cycle history for an agent
      description: |
        Returns a wrapped object containing the agent name, log date, and an array
        of cycle summaries (newest first). Each cycle summary includes turn count,
        cost, duration, and a brief action preview.

        **Note (FINDING-3 fix):** Response is a wrapped object `{name, date, cycles:[]}`,
        NOT a flat array. Field names match the server log parser output exactly.
      operationId: getAgentCycles
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
      responses:
        '200':
          description: Cycle history (wrapped object, newest cycle first)
          content:
            application/json:
              schema:
                type: object
                required: [name, date, cycles]
                properties:
                  name:
                    type: string
                    description: Agent name
                    example: alice
                  date:
                    type: string
                    description: Log date in YYYY_MM_DD format
                    example: "2026_04_07"
                  cycles:
                    type: array
                    description: Cycle summaries, newest first
                    items:
                      type: object
                      properties:
                        n:
                          type: integer
                          description: Cycle number (1-indexed, sequential)
                          example: 3
                        started:
                          type: string
                          description: Cycle start timestamp (from log)
                          example: "2026-04-07 14:55:01"
                        ended:
                          type: string
                          nullable: true
                          description: Cycle end timestamp (null if still running)
                          example: "2026-04-07 14:57:22"
                        turns:
                          type: integer
                          nullable: true
                          description: Number of LLM turns in this cycle
                          example: 8
                        cost_usd:
                          type: number
                          nullable: true
                          description: Token cost for this cycle in USD
                          example: 0.042
                        duration_s:
                          type: number
                          nullable: true
                          description: Wall-clock duration in seconds
                          example: 141.3
                        action_count:
                          type: integer
                          description: Number of tool calls and assistant messages logged
                          example: 12
                        preview:
                          type: string
                          description: First 3 actions joined — quick summary of what the cycle did
                          example: "Bash(status.sh) | Read(task_board.md) | >> Claiming T1008..."

  /api/agents/{name}/cycles/{n}:
    get:
      summary: Get full log output for cycle N
      operationId: getAgentCycleDetail
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
        - name: n
          in: path
          required: true
          schema:
            type: integer
          description: Cycle number
      responses:
        '200':
          description: Cycle log output

  /api/agents/{name}/health:
    get:
      summary: Get computed health score for an agent
      operationId: getAgentHealth
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
      responses:
        '200':
          description: Agent health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentHealth'

  /api/agents/{name}/output:
    get:
      summary: List files in agent's output directory
      operationId: listAgentOutput
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
      responses:
        '200':
          description: Output file list (newest first)
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent:
                    type: string
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        size:
                          type: integer
                        mtime:
                          type: string
                          format: date-time

  /api/agents/{name}/output/{file}:
    get:
      summary: Read a specific agent output file
      operationId: readAgentOutput
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
        - name: file
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File content

  # ============================================================
