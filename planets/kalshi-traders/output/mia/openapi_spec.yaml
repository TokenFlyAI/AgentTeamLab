          description: Executor list
          content:
            application/json:
              schema:
                type: object
                properties:
                  executors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExecutorType'
                  default:
                    $ref: '#/components/schemas/ExecutorType'
                  health:
                    type: object
                    additionalProperties:
                      type: object

  /api/executors/health:
    get:
      summary: Health check for all executors (enabled and supported)
      operationId: getExecutorHealth
      tags: [Executors]
      responses:
        '200':
          description: Executor health map

  /api/config/executor:
    get:
      summary: Get executor assignment for all agents
      operationId: getConfigExecutor
      tags: [Executors]
      responses:
        '200':
          description: Per-agent executor assignments
          content:
            application/json:
              schema:
                type: object
                properties:
                  default:
                    $ref: '#/components/schemas/ExecutorType'
                  enabled:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExecutorType'
                  agents:
                    type: object
                    additionalProperties:
                      $ref: '#/components/schemas/ExecutorType'

  # ============================================================
  # Smart Run / Fleet
  # ============================================================
  /api/smart-run/config:
    get:
      summary: Read smart-run configuration
      operationId: getSmartRunConfig
      tags: [Fleet]
      responses:
        '200':
          description: Smart-run config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmartRunConfig'
    post:
      summary: Update smart-run configuration
      description: |
        Partial update — only provided fields are changed.
        Writable fields: `enabled`, `dry_run`, `max_agents`, `selection_mode`,
        `session_max_cycles`, `daily_cost_cap_usd`, `per_agent_cost_cap_usd`.
      operationId: updateSmartRunConfig
      tags: [Fleet]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmartRunConfig'
      responses:
        '200':
          description: Config updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmartRunConfig'

  /api/smart-run/start:
    post:
      summary: Start the Fleet daemon
      operationId: startSmartRun
      tags: [Fleet]
      responses:
        '200':
          description: Fleet daemon started

  /api/smart-run/stop:
    post:
      summary: Stop the Fleet daemon
      operationId: stopSmartRun
      tags: [Fleet]
      responses:
        '200':
          description: Fleet daemon stopped

  /api/smart-run/status:
    get:
      summary: Get Fleet daemon status and running agent count
      operationId: getSmartRunStatus
      tags: [Fleet]
      responses:
        '200':
          description: Fleet status
          content:
            application/json:
              schema:
                type: object
                properties:
                  running:
                    type: boolean
                  agent_count:
                    type: integer
                  config:
                    $ref: '#/components/schemas/SmartRunConfig'

  /api/watchdog-log:
    get:
      summary: Get watchdog log
      operationId: getWatchdogLog
      tags: [Fleet]
      responses:
        '200':
          description: Watchdog log content

  # ============================================================
  # Tasks
  # ============================================================
  /api/tasks:
    get:
      summary: List tasks
      description: |
        Returns tasks from the task board. Supports filtering by assignee, status,
        priority, and keyword search. Optionally include archived done tasks.
      operationId: listTasks
      tags: [Tasks]
      parameters:
        - name: assignee
          in: query
          schema:
            type: string
          example: bob
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - name: priority
          in: query
          schema:
            $ref: '#/components/schemas/TaskPriority'
        - name: q
          in: query
          schema:
            type: string
          description: Keyword filter on title and description
        - name: include_archive
          in: query
          schema:
            type: string
            enum: ["true", "1"]
          description: Include archived done tasks
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'

    post:
      summary: Create a new task
      operationId: createTask
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  example: "Implement WebSocket reconnect"
                description:
                  type: string
                  example: "Add exponential backoff to WS client"
                priority:
                  $ref: '#/components/schemas/TaskPriority'
                group:
                  type: string
                  default: all
                assignee:
                  type: string
                  example: bob
                task_type:
                  type: string
                  default: task
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: title required or invalid priority
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/tasks/{id}:
    get:
      summary: Get a specific task by ID
      operationId: getTask
      tags: [Tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 542
      responses:
        '200':
          description: Task detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found

    patch:
      summary: Update a task
      description: |
        Partial update. Updatable fields: `status`, `priority`, `assignee`, `title`,
        `description`, `notes`, `group`, `task_type`.

        Valid statuses: `open`, `in_progress`, `done`, `blocked`, `in_review`, `cancelled`
      operationId: updateTask
      tags: [Tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: '#/components/schemas/TaskStatus'
                priority:
                  $ref: '#/components/schemas/TaskPriority'
                assignee:
                  type: string
                title:
                  type: string
                description:
                  type: string
                notes:
                  type: string
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - $ref: '#/components/schemas/Task'
        '400':
          description: Invalid status, priority, or assignee
        '404':
          description: Task not found

    delete:
      summary: Delete a task
      operationId: deleteTask
      tags: [Tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  deleted:
                    $ref: '#/components/schemas/Task'
        '404':
          description: Task not found

  /api/tasks/{id}/claim:
    post:
      summary: Atomically claim a task
      description: |
        Sets `status=in_progress` and `assignee=agent` only if the task is currently
        open/unassigned. Uses file locking to prevent race conditions between parallel agents.
        Returns `409` if already claimed by a different agent or already done.
      operationId: claimTask
      tags: [Tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [agent]
              properties:
                agent:
                  type: string
                  example: bob
      responses:
        '200':
          description: Task claimed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: integer
                  status:
                    type: string
                    example: in_progress
                  assignee:
                    type: string
        '404':
          description: Task not found
        '409':
          description: Already claimed or done
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: string
                  claimed_by:
                    type: string

  /api/tasks/{id}/review:
    post:
      summary: Reviewer gate — approve or reject a task
      description: |
        Approving marks the task `done` and checks for a deliverable in task_outputs/
        or the assignee's output/ directory. Sends a DM to the assignee with the verdict.

        Rejecting sets status back to `in_progress` and DMs the assignee with feedback.
      operationId: reviewTask
      tags: [Tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [verdict]
              properties:
                verdict:
                  type: string
                  enum: [approve, reject]
                reviewer:
                  type: string
                  example: olivia
                comment:
                  type: string
                  example: "Deliverable verified, all tests pass"
      responses:
        '200':
          description: Review result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  verdict:
                    type: string
                    enum: [approved, rejected]
                  deliverable_found:
                    type: boolean
                  deliverable_location:
                    type: string
                  task:
                    $ref: '#/components/schemas/Task'
                  comment:
                    type: string
                  task_id:
                    type: string
        '400':
          description: Invalid verdict
        '404':
          description: Task not found

  /api/tasks/{id}/result:
    get:
      summary: Find and read a task's result file
      description: |
        Searches in order: `public/task_outputs/task-{id}-*.md`, then assignee's `output/`.
        Returns the most recent matching file.
      operationId: getTaskResult
      tags: [Tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task result file
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                  source:
                    type: string
                    enum: [task_outputs, agent_output, agent_output_latest]
                  assignee:
                    type: string
                  file:
                    type: string
                  content:
                    type: string
        '404':
          description: No result file found

    post:
      summary: Write a task result file
      description: Writes content to `public/task_outputs/{filename}`.
      operationId: writeTaskResult
      tags: [Tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                filename:
                  type: string
                  default: "task-{id}-result.md"
                  example: "task-542-result.md"
      responses:
        '200':
          description: Result file written
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  task_id:
                    type: string
                  file:
                    type: string

  /api/tasks/archive:
    get:
      summary: List archived done tasks
      operationId: listTaskArchive
      tags: [Tasks]
      responses:
        '200':
          description: Archived task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
    post:
      summary: Archive done tasks
      operationId: archiveTasks
      tags: [Tasks]
      responses:
        '200':
          description: Tasks archived

  /api/tasks/export.csv:
    get:
      summary: Export tasks as CSV
      operationId: exportTasksCsv
      tags: [Tasks]
      responses:
        '200':
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /api/tasks/health:
    get:
      summary: Task board health summary
      operationId: getTaskHealth
      tags: [Tasks]
      responses:
        '200':
          description: Task board stats

  # ============================================================
  # Communication
  # ============================================================
  /api/broadcast:
    post:
      summary: Broadcast a message to all agents' inboxes
      operationId: broadcast
      tags: [Communication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  example: "Sprint 9 kickoff — all agents please check task board"
                from:
                  type: string
                  default: dashboard
                  example: ceo
      responses:
        '200':
          description: Broadcast result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  agents:
                    type: integer
                  failed:
                    type: integer
                  filename:
                    type: string

  /api/ceo/command:
    post:
      summary: CEO quick command routing
      description: |
        Routes commands by prefix:
        - `@agentname <msg>` → DM directly to that agent's inbox
        - `task: <title>` → Create unassigned medium-priority task
        - `/mode <name>` → Switch civilization mode (plan/normal/crazy/autonomous)
        - anything else → Route to alice's inbox as Founder priority

        Maximum 1000 characters.
      operationId: ceCommand
      tags: [Communication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command]
              properties:
                command:
                  type: string
                  maxLength: 1000
                  example: "@bob please investigate the rate limiting issue"
      responses:
        '200':
          description: Command routed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  routed_to:
                    type: string
                  action:
                    type: string
        '400':
          description: Missing command or exceeds length limit

  /api/team-channel:
    get:
      summary: List recent team channel posts
      operationId: listTeamChannel
      tags: [Communication]
      responses:
        '200':
          description: Team channel posts

    post:
      summary: Post to team channel
      operationId: postTeamChannel
      tags: [Communication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                from:
                  type: string
                  example: alice
      responses:
        '200':
          description: Post written

  /api/announcements:
    get:
      summary: List recent announcements
      operationId: listAnnouncements
      tags: [Communication]
      responses:
        '200':
          description: Announcement list

    post:
      summary: Post a civilization-wide announcement
      operationId: postAnnouncement
      tags: [Communication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                from:
                  type: string
                  default: dashboard
      responses:
        '200':
          description: Announcement posted

  /api/ceo-inbox:
    get:
      summary: Get CEO inbox (unread + recently processed)
      operationId: getCeoInbox
      tags: [Communication]
      responses:
        '200':
          description: CEO inbox
          content:
            application/json:
              schema:
                type: object
                properties:
                  unread:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        from:
                          type: string
                        timestamp:
                          type: string
                        content:
                          type: string
                  processed:
                    type: array
                    items:
                      type: object

  /api/ceo-inbox/{filename}/read:
    post:
      summary: Mark a CEO inbox message as read (move to processed)
      operationId: markCeoInboxRead
      tags: [Communication]
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
            pattern: "^[\\w-]+\\.md$"
      responses:
        '200':
          description: Message moved to processed
        '400':
          description: Invalid filename
        '500':
          description: File operation failed

  # ============================================================
  # Culture & Knowledge
  # ============================================================
  /api/consensus:
    get:
      summary: Get consensus board (culture norms + strategic decisions)
      description: Returns raw markdown and parsed entries. Cached 60 seconds.
      operationId: getConsensus
      tags: [Culture]
      responses:
        '200':
          description: Consensus board
          content:
            application/json:
              schema:
                type: object
                properties:
                  raw:
                    type: string
                    description: Raw markdown content
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConsensusEntry'

  /api/consensus/entry:
    post:
      summary: Add a consensus entry (norm or decision)
      description: |
        Auto-assigns ID with prefix based on type:
        - `culture` / `norm` → `C{N}` (e.g., C22)
        - `decision` → `D{N}` (e.g., D10)
        - others → numeric ID

        Valid types: `group`, `authority`, `culture`, `decision`, `relationship`
      operationId: addConsensusEntry
      tags: [Culture]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, content]
              properties:
                type:
                  type: string
                  enum: [group, authority, culture, decision, relationship]
                  example: culture
                content:
                  type: string
                  example: "Always verify deliverables before marking tasks done"
                author:
                  type: string
                  example: alice
                section:
                  type: string
                  description: Target section name (defaults based on type)
      responses:
        '201':
          description: Entry added
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    oneOf:
                      - type: string
                      - type: integer
                    example: "C22"
        '400':
          description: Missing type/content or invalid type

  /api/consensus/entry/{id}:
    delete:
      summary: Delete a consensus entry by ID
      description: Supports string IDs (C1, D5) and numeric IDs.
      operationId: deleteConsensusEntry
      tags: [Culture]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: C21
      responses:
        '200':
          description: Entry deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  deleted:
                    oneOf:
                      - type: string
                      - type: integer
        '404':
          description: Entry not found

  /api/knowledge:
    get:
      summary: List knowledge base files
      operationId: listKnowledge
      tags: [Culture]
      responses:
        '200':
          description: Knowledge file list

  /api/knowledge/{path}:
    get:
      summary: Read a knowledge base file
      operationId: getKnowledge
      tags: [Culture]
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Knowledge file content
          content:
            application/json:
              schema:
                type: object
                properties:
                  path:
                    type: string
                  content:
                    type: string
        '400':
          description: Invalid path (path traversal blocked)
        '404':
          description: File not found

  /api/research:
    get:
      summary: List research files (plans and reports)
      operationId: listResearch
      tags: [Culture]
      responses:
        '200':
          description: Research file list

  /api/research/{file}:
    get:
      summary: Read a research file
      operationId: getResearch
      tags: [Culture]
      parameters:
        - name: file
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Research file content
        '404':
          description: File not found

  # ============================================================
  # Organization & Mode
  # ============================================================
  /api/org:
    get:
      summary: Get organization chart
      operationId: getOrg
      tags: [Organization]
      responses:
        '200':
          description: Org chart data (cached 2 minutes)

  /api/mode:
    get:
      summary: Get current civilization mode
      operationId: getMode
      tags: [Organization]
      responses:
        '200':
          description: Current mode
          content:
            application/json:
              schema:
                type: object
                properties:
                  mode:
                    type: string
                    enum: [plan, normal, crazy, autonomous]
                    example: normal
                  raw:
                    type: string
                    description: Raw company_mode.md contents

    post:
      summary: Switch civilization mode
      operationId: setMode
      tags: [Organization]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode, who, reason]
              properties:
                mode:
                  type: string
                  enum: [plan, normal, crazy, autonomous]
                who:
                  type: string
                  example: ceo
                reason:
                  type: string
                  example: "Plans ready, let's execute"
      responses:
        '200':
          description: Mode switched
        '400':
          description: Invalid mode or missing who/reason

  /api/sops:
    get:
      summary: Get standard operating procedures for current mode
      operationId: getSops
      tags: [Organization]
      responses:
        '200':
          description: SOP content

  /api/ops:
    get:
      summary: Get operational summary
      operationId: getOps
      tags: [Organization]
      responses:
        '200':
          description: Ops summary

  # ============================================================
  # Cost & Metrics
  # ============================================================
  /api/cost:
    get:
      summary: Today's and 7-day token spend per agent
      description: |
        Uses mtime-based cache per agent — only re-greps logs when a log file changes.
        Outer 60-second cache prevents stampedes.
      operationId: getCost
      tags: [Metrics]
      responses:
        '200':
          description: Cost summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  today_usd:
                    type: number
                    example: 1.45
                  today_cycles:
                    type: integer
                    example: 42
                  total_7d_usd:
                    type: number
                    example: 8.23
                  total_7d_cycles:
                    type: integer
                    example: 287
                  per_agent:
                    type: array
                    description: Sorted by today_usd descending
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        today_usd:
                          type: number
                        today_cycles:
                          type: integer

  /api/stats:
    get:
      summary: 7-day agent statistics
      description: 5-minute cache (heavy computation — reads across all agent logs).
      operationId: getStats
      tags: [Metrics]
      responses:
        '200':
          description: 7-day stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      type: object
                  totals:
                    type: object
                    properties:
                      totalCost:
                        type: number
                      totalCycles:
                        type: integer
                  total_cycles:
                    type: integer
                  total_cost:
                    type: number
                  cycles_per_agent:
                    type: object
                  cost_per_agent:
                    type: object

  /api/digest:
    get:
      summary: Get daily digest summary
      operationId: getDigest
      tags: [Metrics]
      responses:
        '200':
          description: Digest data (30-second cache)

  /api/metrics:
    get:
      summary: System-wide metrics snapshot
      description: |
        Returns task stats, agent health, 7-day cost, and HTTP metrics.
        60-second cache — first call can take ~12 seconds (grepping 20 agents × 7 days).
      operationId: getMetrics
      tags: [Metrics]
      responses:
        '200':
          description: Full metrics snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                  tasks:
                    type: object
                    properties:
                      total:
                        type: integer
                      by_status:
                        type: object
                      by_priority:
                        type: object
                      by_assignee:
                        type: object
                      completion_rate_pct:
                        type: integer
                  agents:
                    type: object
                    properties:
                      total:
                        type: integer
                      running:
                        type: integer
                      idle:
                        type: integer
                      stale:
                        type: integer
                      health:
                        type: array
                        items:
                          type: object
                  cost_7d:
                    type: object
                    properties:
                      total_usd:
                        type: number
                      total_cycles:
                        type: integer
                      avg_cost_per_cycle_usd:
                        type: number
                      per_agent:
                        type: array
                        items:
                          type: object
                  http:
                    type: object
                    description: HTTP request metrics snapshot

  # ============================================================
  # Message Bus (SQLite)
  # ============================================================
  /api/messages:
    post:
      summary: Send a message via the SQLite message bus
      operationId: sendMessage
      tags: [MessageBus]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, content]
              properties:
                to:
                  type: string
                  example: bob
                from:
                  type: string
                  example: alice
                content:
                  type: string
                  example: "correlation_pairs.json is ready"
                subject:
                  type: string
      responses:
        '200':
          description: Message enqueued

  /api/messages/broadcast:
    post:
      summary: Broadcast a message to all agents via message bus
      operationId: broadcastMessage
      tags: [MessageBus]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                from:
                  type: string
                content:
                  type: string
      responses:
        '200':
          description: Message broadcast

  /api/messages/queue-depth:
    get:
      summary: Get message queue depth per agent
      operationId: getQueueDepth
      tags: [MessageBus]
      responses:
        '200':
          description: Queue depth map

  /api/inbox/{agent}:
    get:
      summary: Get unacknowledged messages for an agent
      operationId: getInbox
      tags: [MessageBus]
      parameters:
        - name: agent
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
      responses:
        '200':
          description: Agent's message inbox

  /api/inbox/{agent}/{id}/ack:
    post:
      summary: Acknowledge a message
      operationId: ackMessage
      tags: [MessageBus]
      parameters:
        - name: agent
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentName'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Message acknowledged

  /api/code-output:
    get:
      summary: Get shared code output directory listing
      operationId: getCodeOutput
      tags: [Core]
      responses:
        '200':
          description: Code output files

tags:
  - name: Core
    description: Health, config, search, events
  - name: Planets
    description: Multi-planet management
  - name: Agents
    description: Agent lifecycle, status, logs, executors
  - name: Executors
    description: Executor adapter management (claude, kimi, codex, gemini)
  - name: Fleet
    description: Smart-run daemon and Fleet configuration
  - name: Tasks
    description: Task board CRUD, claiming, and review workflow
  - name: Communication
    description: Broadcast, CEO commands, team channel, announcements, inboxes
  - name: Culture
    description: Consensus norms, decisions, knowledge base, research
  - name: Organization
    description: Org chart and civilization mode management
  - name: Metrics
    description: Cost tracking, performance stats, system metrics
  - name: MessageBus
    description: SQLite-backed reliable message bus between agents
