  # STREAMING
  # =========================================================================

  /api/events:
    get:
      tags: [Streaming]
      summary: Global SSE event stream
      description: |
        Server-Sent Events stream for real-time dashboard updates.
        Sends `event: refresh\ndata: {}\n\n` whenever any agent file changes.
        Sends `: keepalive` every 15 seconds.
        Dashboard clients use this to auto-refresh without polling.
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /api/ws:
    get:
      tags: [Streaming]
      summary: WebSocket real-time event stream
      description: |
        WebSocket endpoint for real-time typed events (Task #113, Nick).
        Connect via `ws://host:port/api/ws` — the server handles the HTTP
        Upgrade handshake (RFC 6455).

        **Connection flow:**
        1. Client sends HTTP GET with `Upgrade: websocket` headers
        2. Server replies `101 Switching Protocols`
        3. Server sends `{"type":"hello","ts":<epoch>}` immediately
        4. Server broadcasts events as JSON frames on heartbeat changes

        **Server-pushed event types:**
        - `hello` — `{type, ts}` — sent on connect
        - `heartbeat_update` — `{type, agent, ts}` — when an agent's heartbeat.md changes

        **Client→Server frames supported:**
        - `opcode 0x8` (close) — server replies with close frame and destroys socket
        - `opcode 0x9` (ping) — server replies with pong

        Note: OpenAPI 3.0 does not natively model WebSocket upgrades.
        This entry documents the upgrade handshake path for reference.
      parameters:
        - name: Upgrade
          in: header
          required: true
          schema:
            type: string
            enum: [websocket]
        - name: Sec-WebSocket-Key
          in: header
          required: true
          schema:
            type: string
      responses:
        "101":
          description: Switching Protocols — WebSocket connection established
        "400":
          description: Missing or invalid WebSocket upgrade headers
        "404":
          description: Path is not /api/ws

  # =========================================================================
  # MESSAGING (SQLite message bus — backend/message_bus.js, Task #102)
  # =========================================================================

  /api/messages:
    post:
      tags: [Communication]
      summary: Send direct message
      description: |
        Sends a direct message to one agent via the SQLite-backed message bus.
        Rate limited: max 60 messages/min per sender (MB_MSG_RATE_LIMIT env).
        Note: POST /api/messages/broadcast takes priority in routing — send
        to a specific agent using the `to` field in the request body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from, to, body]
              properties:
                from:
                  type: string
                  description: Sender agent name
                to:
                  type: string
                  description: Recipient agent name
                body:
                  type: string
                  description: Message content
                priority:
                  type: integer
                  minimum: 1
                  maximum: 9
                  default: 5
                  description: Delivery priority (1=highest, 9=lowest)
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Message ID (SQLite rowid)
                  from:
                    type: string
                  to:
                    type: string
                  priority:
                    type: integer
        "400":
          description: Invalid from/to agent name or missing body
        "429":
          description: Rate limit exceeded

  /api/messages/{agent}:
    post:
      tags: [Communication]
      summary: Send file-based message to agent inbox (backend/api.js)
      description: |
        Writes a message file directly to the agent's chat_inbox/ directory.
        This is the file-based inbox system handled by backend/api.js.
        For the SQLite message bus, use POST /api/messages instead.
      parameters:
        - name: agent
          in: path
          required: true
          schema:
            type: string
          description: Target agent name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  description: Message content (markdown)
                from:
                  type: string
                  description: Sender name (defaults to "api")
      responses:
        "201":
          description: Message written to agent inbox
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Missing content field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/messages/broadcast:
    post:
      tags: [Communication]
      summary: Broadcast message to all agents
      description: |
        Fan-out: inserts one message per active agent. Active agents are
        determined by scanning the agents/ directory.
        Rate limited: max 5 broadcasts/min per sender (MB_BROADCAST_RATE_LIMIT env).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from, body]
              properties:
                from:
                  type: string
                  description: Sender agent name
                body:
                  type: string
                  description: Message content
                priority:
                  type: integer
                  minimum: 1
                  maximum: 9
                  default: 5
      responses:
        "201":
          description: Broadcast delivered
          content:
            application/json:
              schema:
                type: object
                properties:
                  delivered:
                    type: integer
                    description: Number of agents the message was delivered to
                  agents:
                    type: array
                    items:
                      type: string
        "400":
          description: Invalid sender or missing body
        "429":
          description: Rate limit exceeded

  /api/messages/queue-depth:
    get:
      tags: [Communication]
      summary: Get unread message count per agent
      description: Returns unread message count for all agents, sorted by count descending.
      responses:
        "200":
          description: Queue depth by agent
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_unread:
                    type: integer
                  by_agent:
                    type: array
                    items:
                      type: object
                      properties:
                        agent:
                          type: string
                        unread:
                          type: integer

  /api/inbox/{agent}:
    get:
      tags: [Communication]
      summary: List unread inbox messages for an agent
      description: |
        Returns up to 50 unread messages in priority+FIFO order (priority ASC, id ASC).
        Does NOT auto-mark as read — call POST /api/inbox/{agent}/{id}/ack to acknowledge.
      parameters:
        - name: agent
          in: path
          required: true
          schema:
            type: string
          description: Agent name
      responses:
        "200":
          description: Unread messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent:
                    type: string
                  unread:
                    type: integer
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/BusMessage"
        "400":
          description: Invalid agent name

  /api/inbox/{agent}/{id}/ack:
    post:
      tags: [Communication]
      summary: Acknowledge (mark as read) a message
      description: Marks a specific unread message as read by setting read_at timestamp.
      parameters:
        - name: agent
          in: path
          required: true
          schema:
            type: string
          description: Agent name (must match message's to_agent)
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Message ID
      responses:
        "200":
          description: Message acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  acked:
                    type: boolean
        "400":
          description: Invalid agent name or message ID
        "404":
          description: Message not found or already acknowledged

# ===========================================================================
# COMPONENTS
# ===========================================================================

components:
  parameters:
    AgentName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Agent name (alice, bob, charlie, etc.)

    TaskId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Task ID

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Pass the API key as a Bearer token.
        Example: `Authorization: Bearer <API_KEY>`
        Enabled when the server's API_KEY env var is set.
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Pass the API key in the X-API-Key header.
        Example: `X-API-Key: <API_KEY>`
        Equivalent to Bearer auth — either scheme is accepted.

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid API key (only enforced when API_KEY env var is set)
      headers:
        WWW-Authenticate:
          schema:
            type: string
            example: Bearer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true

    BusMessage:
      type: object
      description: A message from the SQLite message bus (backend/message_bus.js)
      properties:
        id:
          type: integer
          description: SQLite row ID
        from_agent:
          type: string
        to_agent:
          type: string
        body:
          type: string
        priority:
          type: integer
          minimum: 1
          maximum: 9
          description: 1=highest priority, 9=lowest
        created_at:
          type: string
          format: date-time
        read_at:
          type: string
          format: date-time
          nullable: true
          description: null if unread

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        uptime_ms:
          type: integer
        uptime:
          type: integer
          description: Uptime in seconds
        memory:
          type: object
          properties:
            rss:
              type: integer
            heapUsed:
              type: integer
            heapTotal:
              type: integer
        activeAgents:
          type: integer
        sseClients:
          type: integer

    AgentSummary:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [running, idle, stopped, unknown]
        role:
          type: string
        alive:
          type: boolean
        heartbeat_at:
          type: string
          nullable: true
          description: ISO timestamp of last heartbeat file write
        heartbeat_age_ms:
          type: integer
          nullable: true
        unread_messages:
          type: integer
        cycles:
          type: integer
          description: Number of cycles run today
        last_update:
          type: string
          nullable: true
        lastSeenSecs:
          type: integer
          nullable: true
        auth_error:
          type: string
          nullable: true
          description: Auth error message if agent failed auth (e.g. rate limit)

    AgentDetail:
      allOf:
        - $ref: "#/components/schemas/AgentSummary"
        - type: object
          properties:
            status_content:
              type: string
              description: Raw content of status.md (agent memory)
            persona_content:
              type: string
              nullable: true
            inbox:
              type: array
              items:
                $ref: "#/components/schemas/InboxMessageMeta"
            last_context:
              type: string
              nullable: true

    InboxMessageMeta:
      type: object
      description: Inbox message metadata only — content not returned for security (QI-003)
      properties:
        file:
          type: string
          description: Filename of the inbox message
        read:
          type: boolean
          description: Whether the message has been moved to processed/

    InboxMessage:
      type: object
      properties:
        filename:
          type: string
        from:
          type: string
        timestamp:
          type: string
        content:
          type: string

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        priority:
          $ref: "#/components/schemas/TaskPriority"
        assignee:
          type: string
        status:
          $ref: "#/components/schemas/TaskStatus"
        created:
          type: string
          format: date
        updated:
          type: string
          format: date
        notes:
          type: string
          nullable: true
        notesList:
          type: array
          items:
            type: string
          description: notes split on ' ;; ' delimiter

    TaskStatus:
      type: string
      enum: [open, in_progress, blocked, in_review, done, cancelled]

    TaskPriority:
      type: string
      enum: [low, medium, high, critical]

    CreateTaskRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          description: Task title (non-empty, non-whitespace-only)
        description:
          type: string
        priority:
          $ref: "#/components/schemas/TaskPriority"
        assignee:
          type: string
          default: unassigned
        notes:
          type: string

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        assignee:
          type: string
        notes:
          type: string

    CycleSummary:
      type: object
      properties:
        n:
          type: integer
          description: Cycle number (1-based)
        started:
          type: string
        ended:
          type: string
          nullable: true
        turns:
          type: integer
          nullable: true
        cost_usd:
          type: number
          nullable: true
        duration_s:
          type: number
          nullable: true
        action_count:
          type: integer
        preview:
          type: string
          description: First 3 actions joined by ' | '

    AgentHealthScore:
      type: object
      description: |
        Computed health score for an agent (0–100). Based on five weighted
        dimensions evaluated from live agent state and task board velocity data.
      properties:
        name:
          type: string
          description: Agent name
        score:
          type: integer
          minimum: 0
          maximum: 100
          description: Total health score (sum of dimension scores)
        grade:
          type: string
          enum: [A, B, C, D]
          description: "Letter grade: A≥90, B≥75, C≥55, D<55"
        dimensions:
          type: object
          description: Per-dimension scores and detail text
          properties:
            heartbeat:
              $ref: "#/components/schemas/HealthDimension"
            activity:
              $ref: "#/components/schemas/HealthDimension"
            status:
              $ref: "#/components/schemas/HealthDimension"
            velocity:
              $ref: "#/components/schemas/HealthDimension"
            recency:
              $ref: "#/components/schemas/HealthDimension"
      example:
        name: alice
        score: 88
        grade: B
        dimensions:
          heartbeat: { score: 25, detail: "alive (1m ago)" }
          activity: { score: 20, detail: "2 unread (light backlog)" }
          status: { score: 20, detail: "actively working" }
          velocity: { score: 16, detail: "2 tasks done in last 3d" }
          recency: { score: 7, detail: "last seen 2h ago" }

    HealthDimension:
      type: object
      properties:
        score:
          type: integer
          description: Points awarded for this dimension
        detail:
          type: string
          description: Human-readable explanation

    Announcement:
      type: object
      properties:
        filename:
          type: string
        content:
          type: string
        title:
          type: string
        body:
          type: string
        from:
          type: string
          nullable: true
        date:
          type: string
          nullable: true

    ConsensusEntry:
      type: object
      properties:
        id:
          type: integer
        section:
          type: string
        type:
          type: string
        content:
          type: string
        author:
          type: string
        updated:
          type: string

    CostResponse:
      type: object
      properties:
        today_usd:
          type: number
        today_cycles:
          type: integer
        total_7d_usd:
          type: number
        total_7d_cycles:
          type: integer
        per_agent:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              today_usd:
                type: number
              today_cycles:
                type: integer

    MetricsResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        tasks:
          type: object
          properties:
            total:
              type: integer
            by_status:
              type: object
              additionalProperties:
                type: integer
            by_priority:
              type: object
              additionalProperties:
                type: integer
            by_assignee:
              type: object
              additionalProperties:
                type: integer
            completion_rate_pct:
              type: integer
        agents:
          type: object
          properties:
            total:
              type: integer
            running:
              type: integer
            idle:
              type: integer
            stale:
              type: integer
            health:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  status:
                    type: string
                  heartbeat_age_ms:
                    type: integer
                    nullable: true
        cost_7d:
          type: object
          properties:
            total_usd:
              type: number
            total_cycles:
              type: integer
            avg_cost_per_cycle_usd:
              type: number
            per_agent:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  cost_usd:
                    type: number
                  cycles:
                    type: integer
        http:
          type: object
          description: HTTP request metrics from Bob's middleware
