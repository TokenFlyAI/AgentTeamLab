  /api/consensus/entry:
    post:
      tags: [Communication]
      summary: Add consensus entry
      description: |
        Appends a new entry to the social consensus board (public/consensus.md).
        - `type` must be one of the five valid types (case-insensitive); invalid values return 400.
        - Pipe characters (`|`) in `content` are sanitized to `-` to prevent table corruption.
        - `author` is sanitized to `[a-zA-Z0-9_-]` only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, content]
              properties:
                type:
                  type: string
                  enum: [group, authority, culture, decision, relationship]
                  description: Entry category. Must be one of the five valid types (case-insensitive).
                content:
                  type: string
                  description: Entry body. Pipe characters are sanitized to `-`.
                author:
                  type: string
                  default: agent
                  description: Author identifier. Non-alphanumeric chars (except `_-`) are stripped.
                section:
                  type: string
                  default: Evolving Relationships
                  description: Section of consensus.md to append to.
      responses:
        "201":
          description: Entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: integer
        "400":
          description: Missing required fields or invalid type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing_fields:
                  value: { error: "type and content are required" }
                invalid_type:
                  value: { error: "invalid type: must be group, authority, culture, decision, or relationship" }
        "500":
          description: File write error

