openapi: 3.0.3
info:
  title: Tokenfly Agent Lab — server.js API
  version: "1.8"
  description: |
    Complete REST API for the Tokenfly Agent Lab dashboard server (server.js).
    All endpoints are served on port 3199 by default.

    ## Authentication
    Set the `API_KEY` environment variable on the server to enable auth.
    When set, all `/api/*` endpoints require one of:
    - `Authorization: Bearer <API_KEY>` header
    - `X-API-Key: <API_KEY>` header

    If `API_KEY` is unset (development mode), all requests are allowed without credentials.
    Unauthenticated requests return 401 with `WWW-Authenticate: Bearer`.

    ## Rate Limiting
    Rate limiting is enforced by Bob's middleware on /api/* routes.

    ## CORS
    CORS is enabled on all /api/* routes (Access-Control-Allow-Origin: *).

servers:
  - url: http://localhost:3199
    description: Local dashboard server

# Auth is enforced when API_KEY env var is set on the server.
# If API_KEY is unset (dev mode), all requests are allowed without credentials.
# Two equivalent schemes accepted — only one is required per request.
security:
  - BearerAuth: []
  - ApiKeyHeader: []

tags:
  - name: Core
    description: Health, config, and dashboard
  - name: Agents
    description: Agent status, lifecycle, and messaging
  - name: Agent Data
    description: Agent sub-resources (inbox, cycles, output, persona)
  - name: Tasks
    description: Task board management
  - name: Communication
    description: Team channel, announcements, broadcast
  - name: CEO
    description: CEO inbox and quick command routing
  - name: Organization
    description: Org chart, modes, SOPs
  - name: Stats
    description: Cost, metrics, and monitoring
  - name: Knowledge
    description: Research, knowledge base
  - name: Streaming
    description: Server-Sent Events

paths:

  # =========================================================================
  # CORE
  # =========================================================================

  /api/health:
    get:
      tags: [Core]
      summary: Server health check
      description: Returns uptime, memory stats, active agent count, and SSE client count.
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                uptime_ms: 123456789
                uptime: 123456
                memory:
                  rss: 52428800
                  heapUsed: 30000000
                  heapTotal: 45000000
                activeAgents: 5
                sseClients: 2

  /api/config:
    get:
      tags: [Core]
      summary: Company configuration
      description: Returns parsed company name, mode, and raw company.md content.
      responses:
        "200":
          description: Config object
          content:
            application/json:
              schema:
                type: object
                properties:
                  company_name:
                    type: string
                  mode:
                    type: string
                  company_md:
                    type: string

  /api/dashboard:
    get:
      tags: [Core]
      summary: Combined dashboard snapshot
      description: Returns all agents, tasks, and current company mode in one call.
      responses:
        "200":
          description: Dashboard snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentSummary"
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"
                  mode:
                    type: string

  /api/search:
    get:
      tags: [Core]
      summary: Search across agents and tasks
      description: Full-text search over agent status, task titles, and task descriptions.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentSummary"
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"

  # =========================================================================
  # AGENTS — list and detail
  # =========================================================================

  /api/agents:
    get:
      tags: [Agents]
      summary: List all agents
      description: Returns array of AgentSummary objects for all known agents.
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentSummary"

  /api/agents/{name}:
    get:
      tags: [Agents]
      summary: Get agent detail
      description: Returns full agent detail including status file content, inbox metadata, persona, and heartbeat info.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  # =========================================================================
  # AGENTS — lifecycle
  # =========================================================================

  /api/agents/{name}/start:
    post:
      tags: [Agents]
      summary: Start an agent
      description: Spawns the agent's run loop via run_subset.sh.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Start result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "409":
          description: Agent already running

  /api/agents/{name}/stop:
    post:
      tags: [Agents]
      summary: Stop an agent
      description: Sends SIGTERM to the agent process.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Stop result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/agents/{name}/ping:
    get:
      tags: [Agents]
      summary: Ping an agent
      description: Returns the agent's current heartbeat timestamp and alive status.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Ping result
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  alive:
                    type: boolean
                  heartbeat_at:
                    type: string
                    nullable: true
                  heartbeat_age_ms:
                    type: integer
                    nullable: true

  /api/agents/{name}/message:
    post:
      tags: [Agents]
      summary: Send message to agent inbox
      description: |
        Writes a message file to the agent's chat_inbox/ directory.
        Alias for POST /api/agents/{name}/inbox. The `from` field is sanitized
        to prevent path traversal.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  description: Message content (markdown)
                from:
                  type: string
                  description: Sender name, sanitized (default "dashboard")
                  default: dashboard
      responses:
        "200":
          description: Message written to inbox
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  filename:
                    type: string
                    description: Filename written to chat_inbox/
                    example: "2026_03_30_12_00_00_from_dashboard.md"
        "400":
          description: Missing or invalid message field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/agents/start-all:
    post:
      tags: [Agents]
      summary: Start all agents
      description: Launches all 20 agents via run_all.sh.
      responses:
        "200":
          description: Start result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/agents/stop-all:
    post:
      tags: [Agents]
      summary: Stop all agents
      description: Sends SIGTERM to all running agent processes.
      responses:
        "200":
          description: Stop result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/agents/smart-start:
    post:
      tags: [Agents]
      summary: Smart start agents
      description: |
        Only starts agents that have actual work: assigned open tasks OR unread inbox messages.
        Token-conservative — avoids spinning up idle agents.
      responses:
        "200":
          description: List of agents started
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  started:
                    type: array
                    items:
                      type: string
                  skipped:
                    type: array
                    items:
                      type: string

  /api/agents/watchdog:
    post:
      tags: [Agents]
      summary: Restart stuck agents
      description: Detects agents with stale heartbeats (>15 min) and restarts them.
      responses:
        "200":
          description: Watchdog result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  restarted:
                    type: array
                    items:
                      type: string
                  checked:
                    type: integer

  /api/watchdog-log:
    get:
      tags: [Agents]
      summary: Get watchdog log
      description: Returns recent watchdog restart history.
      responses:
        "200":
          description: Watchdog log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  # =========================================================================
  # AGENT DATA — sub-resources
  # =========================================================================

  /api/agents/{name}/log:
    get:
      tags: [Agent Data]
      summary: Get agent runtime log
      description: Returns the agent's current runtime log file content.
      parameters:
        - $ref: "#/components/parameters/AgentName"
        - name: tail
          in: query
          schema:
            type: integer
          description: Number of lines from end to return (default: all)
      responses:
        "200":
          description: Log content
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  content:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/agents/{name}/log/stream:
    get:
      tags: [Streaming]
      summary: Live-tail agent log (SSE)
      description: |
        Server-Sent Events stream that tails the agent's runtime log in real time.
        Uses fs.watch + 1s polling fallback. Sends `event: refresh` on new data.
        Sends `: keepalive` every 15 seconds.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /api/agents/{name}/inbox:
    get:
      tags: [Agent Data]
      summary: Get agent inbox
      description: Returns inbox message metadata (filenames, read status). Does NOT return full content for security.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Inbox metadata list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InboxMessageMeta"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Agent Data]
      summary: Post to agent inbox
      description: |
        Writes a new message file to the agent's chat_inbox/.
        Alias for POST /api/agents/{name}/message. The `from` field is sanitized.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  description: Message content (markdown)
                from:
                  type: string
                  description: Sender name, sanitized (default "dashboard")
                  default: dashboard
      responses:
        "200":
          description: Message written
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  filename:
                    type: string
                    description: Filename written to chat_inbox/
        "400":
          description: Missing or invalid message field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/agents/{name}/activity:
    get:
      tags: [Agent Data]
      summary: Get agent activity log
      description: Returns the agent's activity.md content.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Activity content
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string

  /api/agents/{name}/status:
    get:
      tags: [Agent Data]
      summary: Get agent status file
      description: Returns the agent's status.md content (agent memory).
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Status content
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string

  /api/agents/{name}/todo:
    get:
      tags: [Agent Data]
      summary: Get agent todo list
      description: Returns the agent's todo.md content.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Todo content
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string

  /api/agents/{name}/persona:
    get:
      tags: [Agent Data]
      summary: Get agent persona
      description: Returns the agent's persona.md content.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Persona content
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string
    patch:
      tags: [Agent Data]
      summary: Update agent persona
      description: Appends an evolution entry to the agent's persona evolution log.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entry]
              properties:
                entry:
                  type: string
                  description: The evolution note to append
      responses:
        "200":
          description: Persona updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/agents/{name}/persona/note:
    post:
      tags: [Agent Data]
      summary: Append persona note
      description: Appends a note to the agent's persona evolution log file.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [note]
              properties:
                note:
                  type: string
      responses:
        "200":
          description: Note appended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/agents/{name}/lastcontext:
    get:
      tags: [Agent Data]
      summary: Get agent last context
      description: Returns the agent's last_context.md content.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Last context content
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  content:
                    type: string

  /api/agents/{name}/cycles:
    get:
      tags: [Agent Data]
      summary: List agent cycle history
      description: |
        Returns today's cycle summaries for an agent — cost, turns, duration, action preview.
        Results are newest-first.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Cycle list
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  date:
                    type: string
                    example: "2026_03_30"
                  cycles:
                    type: array
                    items:
                      $ref: "#/components/schemas/CycleSummary"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/agents/{name}/cycles/{n}:
    get:
      tags: [Agent Data]
      summary: Get full cycle output
      description: Returns the complete log output for cycle N of the agent.
      parameters:
        - $ref: "#/components/parameters/AgentName"
        - name: n
          in: path
          required: true
          schema:
            type: integer
          description: Cycle number (1-based)
      responses:
        "200":
          description: Full cycle output
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  cycle:
                    type: integer
                  content:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/agents/{name}/health:
    get:
      tags: [Agent Data]
      summary: Agent health score
      description: |
        Returns a computed health score (0–100) for the agent based on five
        weighted dimensions: heartbeat (25pts), inbox backlog (25pts),
        current status (20pts), velocity (20pts), and recency (10pts).
        Implemented in server.js — calls Ivan's v2 health model.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Agent health score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentHealthScore"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/agents/{name}/output:
    get:
      tags: [Agent Data]
      summary: List agent output files
      description: Returns list of files in the agent's output/ directory.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Output file list
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        file:
                          type: string
                        size:
                          type: integer
                        mtime:
                          type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/agents/{name}/output/{file}:
    get:
      tags: [Agent Data]
      summary: Read agent output file
      description: Returns the content of a specific file from the agent's output/ directory.
      parameters:
        - $ref: "#/components/parameters/AgentName"
        - name: file
          in: path
          required: true
          schema:
            type: string
          description: Filename within the output directory
      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  file:
                    type: string
                  content:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  # =========================================================================
  # TASKS
  # =========================================================================

  /api/tasks:
    get:
      tags: [Tasks]
      summary: List tasks
      description: Returns all tasks from the task board, optionally filtered.
      parameters:
        - name: assignee
          in: query
          schema:
            type: string
          description: Filter by assignee name
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/TaskStatus"
          description: Filter by status
        - name: priority
          in: query
          schema:
            $ref: "#/components/schemas/TaskPriority"
          description: Filter by priority
        - name: q
          in: query
          schema:
            type: string
          description: Full-text search over title and description
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      tags: [Tasks]
      summary: Create a task
      description: Creates a new task row on the task board.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Validation error (empty title or invalid priority)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tasks/archive:
    get:
      tags: [Tasks]
      summary: Get archived tasks
      description: Returns all done tasks from the task board archive.
      responses:
        "200":
          description: Archived task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      tags: [Tasks]
      summary: Archive done tasks
      description: Moves all done tasks from the active board to the archive file.
      responses:
        "200":
          description: Archive result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  archived:
                    type: integer
                    description: Number of tasks archived

  /api/tasks/{id}:
    patch:
      tags: [Tasks]
      summary: Update a task
      description: |
        Updates task fields (status, priority, assignee, title, description, notes).
        Returns the full updated task object.
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkResponse"
                  - $ref: "#/components/schemas/Task"
        "400":
          description: Invalid status or priority
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Tasks]
      summary: Delete a task
      description: Permanently removes a task row from the task board.
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  deleted:
                    $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/tasks/{id}/claim:
    post:
      tags: [Tasks]
      summary: Atomically claim a task
      description: |
        Sets task status to in_progress and assignee to the requesting agent.
        Uses file locking to prevent race conditions between parallel agents.
        Returns 409 if task is already claimed by another agent or is done.
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent]
              properties:
                agent:
                  type: string
                  description: Agent name claiming the task
      responses:
        "200":
          description: Task claimed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: integer
                  status:
                    type: string
                    example: in_progress
                  assignee:
                    type: string
        "400":
          description: Missing agent name
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Task already claimed or done
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: string
                  claimed_by:
                    type: string
                    nullable: true

  /api/tasks/{id}/result:
    get:
      tags: [Tasks]
      summary: Get task result
      description: |
        Looks for a task result file in this order:
        1. public/task_outputs/task-{id}-*.md
        2. Assignee's output/ folder (exact match on task id)
        3. Assignee's latest output file (best effort)
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task result
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                  source:
                    type: string
                    enum: [task_outputs, agent_output, agent_output_latest]
                  file:
                    type: string
                  assignee:
                    type: string
                    nullable: true
                  content:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Tasks]
      summary: Write task result file
      description: Writes a result file to public/task_outputs/task-{id}-result.md (or custom filename).
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                filename:
                  type: string
                  description: Custom filename (sanitized). Default: task-{id}-result.md
      responses:
        "200":
          description: Result file written
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  task_id:
                    type: string
                  file:
                    type: string

