  /api/ceo/command:
    post:
      tags: [CEO]
      summary: CEO quick command
      description: |
        Smart routing for CEO commands.

        **Routing rules:**
        - `@agentname <message>` → DM to that agent's inbox (creates `<ts>_from_ceo.md`)
        - `task: <title>` (also `todo:` or `create task:`) → Create unassigned medium-priority task
        - `/mode <name>` → Switch company mode (plan/normal/crazy/autonomous)
        - anything else → Routes to alice's inbox as CEO priority

        **Input validation (SEC-006):**
        - `command` is required and cannot be empty/whitespace
        - Maximum length: 1000 characters
        - ASCII control characters (U+0000–U+001F, U+007F) are stripped (except tab/LF/CR)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command]
              properties:
                command:
                  type: string
                  maxLength: 1000
                  description: CEO command string (max 1000 chars; control chars stripped)
                  examples:
                    dm:
                      value: "@bob please fix the rate limiting bug"
                    task:
                      value: "task: Implement WebSocket real-time updates"
                    mode:
                      value: "/mode crazy"
                    default:
                      value: "What is the status of the login feature?"
      responses:
        "200":
          description: Command result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  action:
                    type: string
                    enum: [dm, task_created, mode_switched, routed_to_alice]
                  agent:
                    type: string
                    nullable: true
                  filename:
                    type: string
                    nullable: true
                  id:
                    type: integer
                    nullable: true
                  mode:
                    type: string
                    nullable: true
        "201":
          description: Task created via `task:` prefix
        "400":
          description: Empty command

